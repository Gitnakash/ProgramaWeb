<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Slither 2 Players</title>

<style>
body{
margin:0;
overflow:hidden;
background:#0b0b0b;
font-family:Arial;
}

canvas{
display:block;
}
</style>

</head>
<body>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const HUD=60

let mapWidth=canvas.width
let mapHeight=canvas.height-HUD

let foods=[]

for(let i=0;i<120;i++){
foods.push({
x:Math.random()*mapWidth,
y:Math.random()*mapHeight+HUD
})
}

function newSnake(x,y,color){

return{
x:x,
y:y,
angle:0,
speed:2,
body:[],
length:60,
color:color,
alive:true,
score:0
}

}

// spawn justo (lados opostos)
let p1=newSnake(200,canvas.height/2,"#00ff88")
let p2=newSnake(canvas.width-200,canvas.height/2,"#00aaff")

p2.angle=Math.PI

let keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function control(){

if(keys["a"]) p1.angle-=0.06
if(keys["d"]) p1.angle+=0.06
if(keys["w"]) p1.speed=3
else p1.speed=2

if(keys["ArrowLeft"]) p2.angle-=0.06
if(keys["ArrowRight"]) p2.angle+=0.06
if(keys["ArrowUp"]) p2.speed=3
else p2.speed=2

}

function moveSnake(s){

if(!s.alive)return

s.x+=Math.cos(s.angle)*s.speed
s.y+=Math.sin(s.angle)*s.speed

s.body.push({x:s.x,y:s.y})

while(s.body.length>s.length){
s.body.shift()
}

}

function eatFood(s){

foods.forEach((f,i)=>{

let dx=s.x-f.x
let dy=s.y-f.y

let d=Math.sqrt(dx*dx+dy*dy)

if(d<10){

s.length+=20
s.score+=1

foods[i]={
x:Math.random()*mapWidth,
y:Math.random()*mapHeight+HUD
}

}

})

}

function drawSnake(s){

let gradient=ctx.createLinearGradient(
s.body[0].x,
s.body[0].y,
s.x,
s.y
)

gradient.addColorStop(0,"white")
gradient.addColorStop(1,s.color)

ctx.strokeStyle=gradient
ctx.lineWidth=14
ctx.lineCap="round"

ctx.beginPath()

s.body.forEach((p,i)=>{
if(i==0) ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)
})

ctx.stroke()

ctx.fillStyle=s.color
ctx.beginPath()
ctx.arc(s.x,s.y,10,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"

let ex=Math.cos(s.angle)*6
let ey=Math.sin(s.angle)*6

ctx.beginPath()
ctx.arc(s.x+ex-3,s.y+ey-3,3,0,Math.PI*2)
ctx.arc(s.x+ex+3,s.y+ey+3,3,0,Math.PI*2)
ctx.fill()

}

function drawFood(){

foods.forEach(f=>{

let glow=ctx.createRadialGradient(
f.x,f.y,1,
f.x,f.y,8
)

glow.addColorStop(0,"white")
glow.addColorStop(1,"orange")

ctx.fillStyle=glow

ctx.beginPath()
ctx.arc(f.x,f.y,6,0,Math.PI*2)
ctx.fill()

})

}

function drawBackground(){

ctx.fillStyle="#0b0b0b"
ctx.fillRect(0,HUD,canvas.width,canvas.height)

ctx.strokeStyle="#141414"
ctx.lineWidth=1

for(let x=0;x<mapWidth;x+=60){

ctx.beginPath()
ctx.moveTo(x,HUD)
ctx.lineTo(x,canvas.height)
ctx.stroke()

}

for(let y=HUD;y<canvas.height;y+=60){

ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()

}

}

function drawHUD(){

ctx.fillStyle="#111"
ctx.fillRect(0,0,canvas.width,HUD)

ctx.fillStyle="white"
ctx.font="20px Arial"

ctx.fillText("PLAYER 1 (WASD): "+p1.score,20,35)
ctx.fillText("PLAYER 2 (ARROWS): "+p2.score,canvas.width-220,35)

ctx.strokeStyle="#333"
ctx.beginPath()
ctx.moveTo(0,HUD)
ctx.lineTo(canvas.width,HUD)
ctx.stroke()

}

function checkWall(s){

if(
s.x<0||
s.x>mapWidth||
s.y<HUD||
s.y>canvas.height
){
s.alive=false
}

}

function collideSnake(a,b){

for(let part of b.body){

let dx=a.x-part.x
let dy=a.y-part.y

let d=Math.sqrt(dx*dx+dy*dy)

if(d<8){
a.alive=false
}

}

}

function game(){

control()

moveSnake(p1)
moveSnake(p2)

eatFood(p1)
eatFood(p2)

checkWall(p1)
checkWall(p2)

collideSnake(p1,p2)
collideSnake(p2,p1)

drawBackground()

drawFood()

if(p1.alive)drawSnake(p1)
if(p2.alive)drawSnake(p2)

drawHUD()

if(!p1.alive||!p2.alive){

ctx.fillStyle="white"
ctx.font="40px Arial"

let text=""

if(!p1.alive&&!p2.alive) text="EMPATE"
else if(!p1.alive) text="PLAYER 2 VENCEU"
else text="PLAYER 1 VENCEU"

ctx.fillText(text,canvas.width/2-150,canvas.height/2)

return
}

requestAnimationFrame(game)

}

game()

</script>

</body>
</html>
